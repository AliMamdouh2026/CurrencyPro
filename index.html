<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CurrencyPro</title>

<meta name="theme-color" content="#2563eb">
<meta name="description" content="CurrencyPro - Live Currency Converter">

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
</head>

<body>

<div id="app">

<header class="header">

<h1>💱 CurrencyPro</h1>

<p>محول العملات المباشر</p>

</header>

<main id="converter">

<div class="card">

<label>المبلغ</label>

<input
id="amount"
type="number"
placeholder="أدخل المبلغ"
value="1">

<label>من</label>

<select id="from"></select>

<button id="swapBtn">
🔄 تبديل العملات
</button>

<label>إلى</label>

<select id="to"></select>

<div id="resultCard">

<h3>النتيجة</h3>

<h2 id="result">--</h2>

<p id="updated"></p>

</div>

</div>

</main>

</div>

<script src="currencies.js"></script>
<script src="app.js"></script>

</body>
</html>
